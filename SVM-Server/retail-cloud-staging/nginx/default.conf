# ===== HTTP (80) — App/API 直连，不跳转 =====
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API 直通
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MQTT WebSocket
    location /mqtt {
        proxy_pass http://emqx:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # 静态文件 + SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ===== HTTPS (443) 主服务 =====
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ---- 自签证书（IoT 无域名场景；浏览器会提示"不安全"需手动信任） ----
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:2m;
    ssl_session_timeout 1h;

    # ---- 访问门禁：整站 HTTP Basic Auth ----
    auth_basic           "Retail Cloud Console";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源长缓存（仍受 Basic Auth 保护）
    location /css/ { expires 7d; }
    location /js/  { expires 7d; }

    # 设备上传图片专用路径：走后端 token 鉴权，豁免整站 Basic Auth
    # 必须用 location = 精确匹配，否则会落到带 auth_basic 的 /api/
    location = /api/snapshot/upload {
        auth_basic off;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 上传体较大，放宽
        client_max_body_size 55m;
    }

    # 推理服务接口（模型切换，演示用，免Basic Auth方便）
    location /api/model/ {
        auth_basic off;
        proxy_pass http://inference:8000/model/;
        proxy_set_header Host $host;
    }

    # 后端 REST 代理（受 Basic Auth 保护）
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MQTT WebSocket 代理到 EMQX（wss，浏览器 MQTT.js 走 wss://.../mqtt）
    location /mqtt {
        proxy_pass http://emqx:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # SPA 兜底
    location / {
        try_files $uri $uri/ /index.html;
    }
}